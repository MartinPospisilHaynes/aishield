<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Accent gradient (brand) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative glow orbs -->
  <circle cx="200" cy="315" r="250" fill="#d946ef" opacity="0.06" filter="url(#glow-soft)"/>
  <circle cx="1000" cy="315" r="250" fill="#06b6d4" opacity="0.06" filter="url(#glow-soft)"/>
  <circle cx="600" cy="200" r="150" fill="#a855f7" opacity="0.04" filter="url(#glow-soft)"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Shield logo (centered, large) -->
  <g transform="translate(170, 140) scale(5.5)" filter="url(#glow)">
    <path d="M32 3C32 3 8 12 8 12v21c0 8.4 3.6 16.4 9.6 22.2C23 60.4 27.8 63 32 64c4.2-1 9-3.6 14.4-8.8C52.4 49.4 56 41.4 56 33V12L32 3z" fill="url(#bg)" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M32 10C32 10 14 17 14 17v16c0 6.6 2.8 13 7.6 17.6C25.8 54.6 29.4 56.6 32 57.4c2.6-.8 6.2-2.8 10.4-6.8C47.2 46 50 39.6 50 33V17L32 10z" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.35" stroke-linejoin="round"/>
    <path d="M22 33L29 40L43 24" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brand name -->
  <text x="530" y="230" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="url(#text-grad)">AIshield.cz</text>
  
  <!-- Tagline -->
  <text x="530" y="295" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="32" fill="#f1f5f9">Váš štít proti pokutám EU za AI Act</text>
  
  <!-- Description line -->
  <text x="530" y="355" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#94a3b8">Automatizovaný compliance scanner pro české firmy</text>
  
  <!-- Divider line (neon gradient) -->
  <rect x="530" y="385" width="120" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  
  <!-- Feature badges -->
  <g transform="translate(530, 420)">
    <!-- Badge 1: Sken za 60s -->
    <rect x="0" y="0" width="185" height="42" rx="21" fill="rgba(232,121,249,0.1)" stroke="rgba(232,121,249,0.3)" stroke-width="1"/>
    <text x="92" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16" fill="#e879f9" text-anchor="middle">⚡ Sken za 60 sekund</text>
    
    <!-- Badge 2: Pokuta až 35M EUR -->
    <rect x="205" y="0" width="210" height="42" rx="21" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <text x="310" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16" fill="#f87171" text-anchor="middle">⚠ Pokuta až 35 mil. €</text>
    
    <!-- Badge 3: Deadline 2026 -->
    <rect x="435" y="0" width="195" height="42" rx="21" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
    <text x="532" y="27" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16" fill="#22d3ee" text-anchor="middle">📅 Deadline: 8/2026</text>
  </g>
  
  <!-- Bottom URL -->
  <text x="600" y="570" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#64748b" text-anchor="middle">aishield.cz — Začněte zdarma</text>
  
  <!-- Bottom gradient line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
