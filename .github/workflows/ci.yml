name: "🛡️ AIshield CI/CD"

# ════════════════════════════════════════════
# Spouští se při:
#  - Push na main → plný test + deploy
#  - Pull request → test only (bez deploye)
#  - Ruční spuštění (workflow_dispatch)
#  - Denně v 6:00 UTC (monitoring)
# ════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Přeskočit deploy?"
        type: boolean
        default: false
  schedule:
    # Denní smoke test v 6:00 UTC (7:00 CET)
    - cron: "0 6 * * *"

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════
  #  JOB 1: Backend testy
  # ══════════════════════════════════════
  backend-test:
    name: "🐍 Backend test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt 2>/dev/null || pip install requests

      - name: Backend syntax check
        run: |
          python -m py_compile backend/api/scan.py
          python -m py_compile backend/api/dashboard.py
          python -m py_compile backend/api/admin.py
          echo "✅ Backend syntax OK"

  # ══════════════════════════════════════
  #  JOB 2: Frontend build
  # ══════════════════════════════════════
  frontend-build:
    name: "⚛️ Frontend build"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.aishield.cz
          NEXT_PUBLIC_SUPABASE_URL: https://rsxwqcrkttlfnqbjgpgc.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npx next build
          echo "✅ Frontend build OK"

  # ══════════════════════════════════════
  #  JOB 3: E2E testy (mega suite)
  # ══════════════════════════════════════
  e2e-test:
    name: "🧪 E2E testy (52 testů)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install requests

      - name: Run mega E2E test suite
        run: python test_mega_e2e.py

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: test_mega_report.json
          retention-days: 30

      # Publikovat report na GitHub Pages
      - name: Prepare Pages report
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public
          python -c "
          import json, time
          with open('test_mega_report.json') as f:
              data = json.load(f)
          passed = data['passed']
          total = data['total']
          failed = data['failed']
          status = '✅ PASS' if failed == 0 else '❌ FAIL'
          color = '#22c55e' if failed == 0 else '#ef4444'
          tests_html = ''
          for t in data['tests']:
              icon = '✅' if t['passed'] else '❌'
              detail = t['detail'].replace('<','&lt;').replace('>','&gt;')[:100]
              tests_html += f'<tr><td>{icon}</td><td>{t[\"phase\"]}</td><td>{t[\"name\"]}</td><td>{t[\"duration\"]:.1f}s</td><td><code>{detail}</code></td></tr>\n'
          html = f'''<!DOCTYPE html>
          <html lang=\"cs\">
          <head>
          <meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">
          <title>AIshield.cz — Test Report</title>
          <style>
          *{{margin:0;padding:0;box-sizing:border-box}}
          body{{font-family:Inter,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:2rem}}
          h1{{font-size:1.5rem;margin-bottom:1rem}}
          .status{{display:inline-block;padding:.5rem 1.5rem;border-radius:1rem;font-weight:700;font-size:1.2rem;background:{color}20;color:{color};border:2px solid {color}}}
          .meta{{margin:1rem 0;color:#94a3b8;font-size:.9rem}}
          table{{width:100%;border-collapse:collapse;margin-top:1.5rem;font-size:.85rem}}
          th{{text-align:left;padding:.6rem;border-bottom:2px solid #334155;color:#94a3b8;font-weight:600}}
          td{{padding:.5rem .6rem;border-bottom:1px solid #1e293b}}
          tr:hover{{background:#1e293b}}
          code{{background:#1e293b;padding:2px 6px;border-radius:4px;font-size:.8rem}}
          .brand{{background:linear-gradient(135deg,#e879f9,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}}
          </style>
          </head>
          <body>
          <h1>🛡️ <span class=\"brand\">AIshield.cz</span> — Test Report</h1>
          <div class=\"status\">{status} — {passed}/{total}</div>
          <div class=\"meta\">
          Čas: {data[\"timestamp\"]} | Trvání: {data[\"duration_s\"]}s | Varování: {data.get(\"warned\",0)}
          </div>
          <table>
          <thead><tr><th></th><th>Fáze</th><th>Test</th><th>Čas</th><th>Detail</th></tr></thead>
          <tbody>{tests_html}</tbody>
          </table>
          <p style=\"margin-top:2rem;color:#475569;font-size:.8rem\">
          Auto-generováno GitHub Actions CI/CD | <a href=\"https://aishield.cz\" style=\"color:#e879f9\">aishield.cz</a>
          </p>
          </body>
          </html>'''
          with open('public/index.html','w') as f:
              f.write(html)
          print('✅ Pages report vygenerován')
          "

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # ══════════════════════════════════════
  #  JOB 4: Deploy na GitHub Pages
  # ══════════════════════════════════════
  deploy-pages:
    name: "📄 GitHub Pages"
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ══════════════════════════════════════
  #  JOB 5: Deploy backend (jen na push do main)
  # ══════════════════════════════════════
  deploy-backend:
    name: "🚀 Deploy backend"
    runs-on: ubuntu-latest
    needs: [e2e-test, frontend-build]
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      !inputs.skip_deploy
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # SSH key setup
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Sync backend files
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='venv' \
            -e "ssh -i ~/.ssh/vps_key" \
            backend/ root@$VPS_HOST:/opt/aishield/backend/

          # Restart service
          ssh -i ~/.ssh/vps_key root@$VPS_HOST 'systemctl restart aishield-api'
          echo "✅ Backend deployed to $VPS_HOST"

  # ══════════════════════════════════════
  #  JOB 6: Deploy frontend (Vercel)
  # ══════════════════════════════════════
  deploy-frontend:
    name: "🌐 Deploy frontend"
    runs-on: ubuntu-latest
    needs: [e2e-test, frontend-build]
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      !inputs.skip_deploy
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          vercel --prod --yes --token=$VERCEL_TOKEN
          echo "✅ Frontend deployed to aishield.cz"

  # ══════════════════════════════════════
  #  JOB 7: Notifikace
  # ══════════════════════════════════════
  notify:
    name: "📬 Notifikace"
    runs-on: ubuntu-latest
    needs: [e2e-test, deploy-backend, deploy-frontend]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Summary
        run: |
          echo "## 🛡️ AIshield CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E testy | ${{ needs.e2e-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend deploy | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend deploy | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
