---
name: "✨ Feature request"
description: "Návrh nové funkce nebo vylepšení"
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Jaký problém to řeší?"
      description: "Proč tuto funkci potřebujete?"
      placeholder: "Zákazníci potřebují..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Navrhované řešení"
      description: "Jak by to mělo fungovat?"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priorita"
      options:
        - 🔴 Kritická (blokuje zákazníky)
        - 🟡 Vysoká (důležité pro byznys)
        - 🟢 Nízká (nice-to-have)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Oblast"
      options:
        - Frontend
        - Backend
        - Dashboard
        - Sken engine
        - Dokumenty
        - Platby
        - Marketing / SEO
        - Jiné
